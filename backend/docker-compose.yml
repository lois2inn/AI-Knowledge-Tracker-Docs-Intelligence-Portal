services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ai_tracker_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ai_tracker_pgdata:/var/lib/postgresql/data

volumes:
  ai_tracker_pgdata:
